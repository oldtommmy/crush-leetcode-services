<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crush LeetCode Admin Login</title>
    <link rel="icon" type="image/png" href="/admin-logo.png?v=20260430" />
    <link rel="apple-touch-icon" href="/admin-logo.png?v=20260430" />
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --paper: #f4f7fb;
        --card: #ffffff;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --accent: #f59e0b;
        --green: #16a34a;
        --danger: #b91c1c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.14), transparent 28rem),
          radial-gradient(circle at 82% 8%, rgba(245, 158, 11, 0.18), transparent 24rem),
          var(--paper);
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", ui-sans-serif, system-ui, sans-serif;
      }

      .shell {
        width: min(960px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 18px;
        align-items: stretch;
        animation: pageIn 360ms ease-out both;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      }

      .banner {
        position: relative;
        overflow: hidden;
        padding: 30px;
        border-top: 5px solid var(--brand);
      }

      .banner::after {
        content: "";
        position: absolute;
        right: -64px;
        bottom: -72px;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.08);
      }

      .brand-row {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(17, 24, 39, 0.14);
      }

      .tag {
        display: inline-flex;
        padding: 5px 10px;
        border-radius: 999px;
        color: #1d4ed8;
        background: #eff6ff;
        font-size: 12px;
        font-weight: 800;
      }

      h1 {
        position: relative;
        z-index: 1;
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.16;
        letter-spacing: -0.03em;
      }

      p {
        position: relative;
        z-index: 1;
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .feature-list {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 9px;
        margin-top: 22px;
      }

      .feature {
        display: flex;
        gap: 9px;
        align-items: center;
        color: #374151;
        font-size: 13px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
      }

      .login {
        padding: 26px;
        border-top: 5px solid var(--accent);
      }

      label {
        display: block;
        margin: 0 0 7px;
        color: #374151;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 13px;
        color: var(--ink);
        background: #ffffff;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: rgba(37, 99, 235, 0.72);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .field {
        margin-bottom: 14px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        cursor: pointer;
        color: white;
        background: var(--brand);
        font: inherit;
        font-weight: 800;
        transition: transform 150ms ease, background 150ms ease, box-shadow 150ms ease;
      }

      button:hover {
        background: var(--brand-dark);
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.18);
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .message {
        min-height: 20px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error {
        color: var(--danger);
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .shell {
          animation: none;
        }

        button {
          transition: none;
        }
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel banner">
        <div class="brand-row">
          <img class="logo" src="/admin-logo.png?v=20260430" alt="Crush LeetCode logo" />
          <span class="tag">Official Mailer Admin</span>
        </div>
        <h1>Crush LeetCode 管理后台</h1>
        <p>用于管理官方周报内测用户、签发访问码、撤销异常 code，并查看使用状态。登录后才会进入控制台，后台接口由服务端 session 校验。</p>
        <div class="feature-list" aria-label="Admin features">
          <div class="feature"><span class="dot"></span><span>用户、访问码、发送状态统一管理</span></div>
          <div class="feature"><span class="dot"></span><span>HttpOnly session 登录保护</span></div>
          <div class="feature"><span class="dot"></span><span>访问码明文只在签发时展示一次</span></div>
        </div>
      </section>

      <section class="panel login">
        <form id="loginForm">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" value="admin" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Admin password" />
          </div>
          <button id="loginButton" type="submit">登录控制台</button>
          <div id="message" class="message"></div>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById('loginForm');
      const button = document.getElementById('loginButton');
      const message = document.getElementById('message');

      function setMessage(text, isError = false) {
        message.textContent = text || '';
        message.classList.toggle('error', Boolean(isError));
      }

      async function checkSession() {
        const response = await fetch('/api/admin/session', { credentials: 'same-origin' });
        const data = await response.json().catch(() => ({}));
        if (data.authenticated) {
          window.location.replace('/admin/dashboard');
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        button.disabled = true;
        setMessage('登录中...');
        try {
          const response = await fetch('/api/admin/session', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value.trim(),
              password: document.getElementById('password').value
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || data.ok === false) {
            throw new Error(data.error || 'Login failed.');
          }
          window.location.replace('/admin/dashboard');
        } catch (error) {
          setMessage(error.message, true);
        } finally {
          button.disabled = false;
        }
      });

      checkSession().catch(() => {});
    </script>
  </body>
</html>
